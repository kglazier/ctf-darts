# getrandom 0.3+ refuses to build on wasm32-unknown-unknown unless told which
# backend to use. We use the browser's `crypto.getRandomValues` via wasm-bindgen.
# Scoped to the wasm target so Android and host builds are unaffected.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
