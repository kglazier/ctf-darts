<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Space Boosters</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05050f" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #05050f;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #bevy {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
      #boot {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #c8c8d6;
        font: 14px system-ui, sans-serif;
        letter-spacing: 0.06em;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="bevy" tabindex="0"></canvas>
    <div id="boot">loading…</div>
    <script type="module">
      import init from "./pkg/space_boosters.js";
      // Bevy's wasm entry never resolves (winit aborts main via exception),
      // so .then() doesn't fire. Drop the overlay once the canvas has been
      // sized + rendered into; the resize observer fires on the first frame.
      const boot = document.getElementById("boot");
      const canvas = document.getElementById("bevy");
      const drop = () => boot && boot.remove();
      new ResizeObserver((entries) => {
        if (entries[0].contentRect.width > 0) drop();
      }).observe(canvas);
      // Belt + suspenders: kill it after 4s no matter what.
      setTimeout(drop, 4000);
      init().catch(() => {});
    </script>
  </body>
</html>
