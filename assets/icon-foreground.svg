<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Foreground only (transparent background) for the adaptive launcher icon.
       Content sits within the centered ~66% safe zone so the launcher mask
       won't clip anything important. -->

  <!-- Flame trail behind ship -->
  <polygon points="120,256 250,212 250,300"   fill="#ff3010" opacity="0.55"/>
  <polygon points="160,256 252,222 252,290" fill="#ff7a1a" opacity="0.85"/>
  <polygon points="200,256 254,234 254,278" fill="#ffd24a"/>

  <!-- Triangle ship -->
  <polygon points="400,256 240,160 240,352"
           fill="#ffd933"
           stroke="#fff8d0"
           stroke-width="8"
           stroke-linejoin="round"/>

  <!-- Cockpit accent -->
  <circle cx="320" cy="256" r="13" fill="#ff7a1a"/>
</svg>
