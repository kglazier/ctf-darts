<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.55" r="0.8">
      <stop offset="0%" stop-color="#1c1c3c"/>
      <stop offset="100%" stop-color="#04040c"/>
    </radialGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3010" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff7a1a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="74" cy="92"  r="3"   fill="#ffffff"/>
  <circle cx="430" cy="76" r="2.5" fill="#ffffff"/>
  <circle cx="62"  cy="380" r="2"  fill="#ffffff"/>
  <circle cx="448" cy="430" r="2"  fill="#ffffff"/>
  <circle cx="376" cy="372" r="1.5" fill="#ffffff"/>
  <circle cx="120" cy="208" r="1.5" fill="#ffffff"/>
  <circle cx="280" cy="80"  r="1.5" fill="#ffffff"/>
  <circle cx="350" cy="200" r="1"  fill="#ffffff"/>
  <circle cx="200" cy="450" r="1"  fill="#ffffff"/>

  <!-- Flame trail (rear of ship, extending leftward) -->
  <polygon points="60,256 220,206 220,306" fill="url(#flame)" opacity="0.9"/>
  <polygon points="140,256 224,228 224,284" fill="#ffd24a" opacity="0.85"/>

  <!-- Asteroids-style triangle ship pointing right -->
  <polygon points="430,256 218,140 218,372"
           fill="#ffd933"
           stroke="#fff8d0"
           stroke-width="8"
           stroke-linejoin="round"/>

  <!-- Cockpit / accent -->
  <circle cx="320" cy="256" r="14" fill="#ff7a1a" opacity="0.9"/>
</svg>
